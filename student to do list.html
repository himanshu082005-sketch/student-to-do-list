<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster - Modern To-Do List</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Light Theme */
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --border: #e2e8f0;
            --shadow: 0 10px 25px rgba(0,0,0,0.1);
            --radius: 12px;
        }

        [data-theme="dark"] {
            /* Dark Theme */
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: all 0.3s ease;
            min-height: 100vh;
        }

        /* Container */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            box-shadow: var(--shadow);
            padding: 1rem 0;
            margin-bottom: 2rem;
        }

        .header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .theme-toggle {
            background: var(--accent);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }

        .theme-toggle:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.4);
        }

        .sun-icon { display: block; }
        .moon-icon { display: none; }

        [data-theme="dark"] .sun-icon { display: none; }
        [data-theme="dark"] .moon-icon { display: block; }

        /* Input Section */
        .input-section { margin-bottom: 2rem; }

        .input-container {
            display: flex;
            gap: 12px;
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        #taskInput {
            flex: 1;
            padding: 16px 20px;
            border: 2px solid transparent;
            border-radius: 10px;
            font-size: 16px;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
            font-family: inherit;
        }

        #taskInput:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .add-btn {
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.4);
        }

        /* Stats */
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 2rem;
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .stat-item {
            text-align: center;
            flex: 1;
        }

        .stat-item span:first-child {
            display: block;
            font-size: 2rem;
            font-weight: 600;
            color: var(--accent);
        }

        /* Filter Buttons */
        .filter-section {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
            background: var(--bg-secondary);
            padding: 15px 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow-x: auto;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid transparent;
            background: transparent;
            color: var(--text-secondary);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        /* Task List */
        .task-list {
            list-style: none;
        }

        .task-item {
            background: var(--bg-secondary);
            margin-bottom: 12px;
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            opacity: 0;
            transform: translateY(20px);
            animation: slideIn 0.4s ease forwards;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
        }

        .task-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .task-item.completed {
            opacity: 0.7;
            background: linear-gradient(135deg, #f0fdf4, #dcfce7);
        }

        .task-checkbox {
            width: 22px;
            height: 22px;
            accent-color: var(--success);
            cursor: pointer;
            transform: scale(1.1);
            transition: transform 0.2s ease;
        }

        .task-checkbox:hover {
            transform: scale(1.3);
        }

        .task-content {
            flex: 1;
            padding: 5px 0;
        }

        .task-text {
            font-size: 16px;
            margin-bottom: 5px;
            word-break: break-word;
        }

        .task-text.completed {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 16px;
        }

        .edit-btn {
            background: var(--warning);
            color: white;
        }

        .edit-btn:hover {
            background: #d97706;
            transform: scale(1.1);
        }

        .delete-btn {
            background: var(--danger);
            color: white;
        }

        .delete-btn:hover {
            background: #dc2626;
            transform: scale(1.1);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
            display: none;
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: block;
        }

        /* Footer */
        .footer {
            margin-top: 4rem;
            padding: 2rem 0;
            text-align: center;
            color: var(--text-secondary);
            background: var(--bg-secondary);
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container { padding: 0 15px; }
            .header .container { padding: 0 15px; }
            .logo { font-size: 1.5rem; }
            .input-container { flex-direction: column; }
            .stats { flex-direction: column; gap: 15px; }
            .filter-section { justify-content: center; }
            .task-item { padding: 16px; gap: 12px; }
            .action-btn { width: 36px; height: 36px; font-size: 14px; }
        }

        @media (max-width: 480px) {
            .filter-section { gap: 8px; }
            .filter-btn { padding: 8px 16px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <!-- Header Section -->
    <header class="header">
        <div class="container">
            <h1 class="logo">📝 TaskMaster</h1>
            <!-- Dark/Light Mode Toggle -->
            <button class="theme-toggle" id="themeToggle">
                <span class="sun-icon">☀️</span>
                <span class="moon-icon">🌙</span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <!-- Task Input Section -->
            <div class="input-section">
                <div class="input-container">
                    <input type="text" id="taskInput" placeholder="What needs to be done today?..." maxlength="100">
                    <button id="addTaskBtn" class="add-btn">Add Task ➕</button>
                </div>
            </div>

            <!-- Task Stats -->
            <div class="stats">
                <div class="stat-item">
                    <span id="pendingCount">0</span>
                    <span>Pending</span>
                </div>
                <div class="stat-item">
                    <span id="completedCount">0</span>
                    <span>Completed</span>
                </div>
            </div>

            <!-- Filter Buttons -->
            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="pending">Pending</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <!-- Task List -->
            <ul id="taskList" class="task-list"></ul>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state">
                <div class="empty-icon">📭</div>
                <p>No tasks yet. Add one to get started! 🚀</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 TaskMaster. Made with ❤️ for college project</p>
        </div>
    </footer>

    <script>
        // Wait for DOM to load
        document.addEventListener('DOMContentLoaded', function() {
            // Get DOM elements
            const taskInput = document.getElementById('taskInput');
            const addTaskBtn = document.getElementById('addTaskBtn');
            const taskList = document.getElementById('taskList');
            const pendingCount = document.getElementById('pendingCount');
            const completedCount = document.getElementById('completedCount');
            const emptyState = document.getElementById('emptyState');
            const filterBtns = document.querySelectorAll('.filter-btn');
            const themeToggle = document.getElementById('themeToggle');

            let tasks = [];
            let currentFilter = 'all';

            // Load tasks from localStorage on page load
            loadTasks();

            // Event Listeners
            addTaskBtn.addEventListener('click', addTask);
            taskInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') addTask();
            });

            filterBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    setFilter(this.dataset.filter);
                });
            });

            themeToggle.addEventListener('click', toggleTheme);

            // Add new task
            function addTask() {
                const text = taskInput.value.trim();
                if (text === '') return;

                const task = {
                    id: Date.now(),
                    text: text,
                    completed: false,
                    createdAt: new Date().toLocaleDateString()
                };

                tasks.unshift(task); // Add to beginning
                taskInput.value = '';
                saveTasks();
                renderTasks();
                updateCounts();
            }

            // Toggle task completion
            window.toggleTask = function(id) {
                const task = tasks.find(t => t.id === id);
                if (task) {
                    task.completed = !task.completed;
                    saveTasks();
                    renderTasks();
                    updateCounts();
                }
            }

            // Delete task
            window.deleteTask = function(id) {
                if (confirm('Are you sure you want to delete this task?')) {
                    tasks = tasks.filter(t => t.id !== id);
                    saveTasks();
                    renderTasks();
                    updateCounts();
                }
            }

            // Edit task
            window.editTask = function(id) {
                const task = tasks.find(t => t.id === id);
                if (task) {
                    const newText = prompt('Edit task:', task.text);
                    if (newText !== null && newText.trim() !== '') {
                        task.text = newText.trim();
                        saveTasks();
                        renderTasks();
                    }
                }
            }

            // Set filter
            function setFilter(filter) {
                currentFilter = filter;
                filterBtns.forEach(btn => btn.classList.remove('active'));
                document.querySelector(`[data-filter="${filter}"]`).classList.add('active');
                renderTasks();
            }

            // Render tasks based on filter
            function renderTasks() {
                const filteredTasks = tasks.filter(task => {
                    if (currentFilter === 'pending') return !task.completed;
                    if (currentFilter === 'completed') return task.completed;
                    return true;
                });

                if (filteredTasks.length === 0) {
                    taskList.style.display = 'none';
                    emptyState.style.display = 'block';
                } else {
                    taskList.style.display = 'block';
                    emptyState.style.display = 'none';
                    taskList.innerHTML = filteredTasks.map(task => createTaskHTML(task)).join('');
                }
            }

            // Create task HTML
            function createTaskHTML(task) {
                return `
                    <li class="task-item ${task.completed ? 'completed' : ''}" data-id="${task.id}">
                        <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} 
                               onchange="toggleTask(${task.id})">
                        <div class="task-content">
                            <div class="task-text ${task.completed ? 'completed' : ''}">${escapeHtml(task.text)}</div>
                            <small style="color: var(--text-secondary);">${task.createdAt}</small>
                        </div>
                        <div class="task-actions">
                            <button class="action-btn edit-btn" onclick="editTask(${task.id})" title="Edit">✏️</button>
                            <button class="action-btn delete-btn" onclick="deleteTask(${task.id})" title="Delete">🗑️</button>
                        </div>
                    </li>
                `;
            }

            // Update task counts
            function updateCounts() {
                const pending = tasks.filter(t => !t.completed).length;
                const completed = tasks.filter(t => t.completed).length;
                pendingCount.textContent = pending;
                completedCount.textContent = completed;
            }

            // Save tasks to localStorage
            function saveTasks() {
                localStorage.setItem('tasks', JSON.stringify(tasks));
            }

            // Load tasks from localStorage
            function loadTasks() {
                const saved = localStorage.getItem('tasks');
                if (saved) {
                    tasks = JSON.parse(saved);
                    renderTasks();
                    updateCounts();
                }
            }

            // Toggle dark/light theme
            function toggleTheme() {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
            }

            // Load saved theme
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);

            // Escape HTML to prevent XSS
            function escapeHtml(text) {
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                };
                return text.replace(/[&<>"']/g, m => map[m]);
            }

            // Focus input on page load
            taskInput.focus();
        });
    </script>
</body>
</html>
