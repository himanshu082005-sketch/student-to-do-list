<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student To-Do App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f5ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 25px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .input-section {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #4a6cf7;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #3451c7;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            background: #eef2ff;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-btn {
            background: red;
            padding: 5px 10px;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Student To-Do List</h1>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Enter your task">
            <button onclick="addTask()">Add</button>
        </div>

        <ul id="taskList"></ul>
    </div>

    <script>
        function addTask() {
            let input = document.getElementById("taskInput");
            let taskText = input.value;

            if (taskText === "") {
                alert("Please enter a task");
                return;
            }

            let li = document.createElement("li");

            li.innerHTML = `
                ${taskText}
                <span class="delete-btn" onclick="removeTask(this)">X</span>
            `;

            document.getElementById("taskList").appendChild(li);

            input.value = "";
        }

        function removeTask(element) {
            element.parentElement.remove();
        }
    </script>

</body>
</html>
